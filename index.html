<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>TOEIC 短期詰め込み単語</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --text:#181a1f; --muted:#6b7280;
    --line:#e5e7eb; --accent:#2563eb; --bad:#dc2626; --mid:#d97706; --good:#16a34a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}
  .wrap{max-width:760px;margin:auto;padding:18px}
  h1{font-size:22px;margin:4px 0 14px}
  .top,.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 18px rgba(0,0,0,.04)}
  .top{padding:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .stat{text-align:center}
  .stat b{display:block;font-size:22px}
  .stat span{font-size:12px;color:var(--muted)}
  .panel{padding:14px;margin-bottom:14px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  input,textarea,button,select{font:inherit}
  input,textarea,select{border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff}
  button{border:0;border-radius:12px;padding:12px 14px;cursor:pointer;font-weight:700}
  button:disabled{opacity:.45;cursor:not-allowed}
  .primary{background:var(--accent);color:white}
  .ghost{background:#eef2ff;color:#1e3a8a}
  .danger{background:#fee2e2;color:#991b1b}
  .card{min-height:330px;padding:26px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
  .word{font-size:42px;font-weight:800;letter-spacing:.3px;word-break:break-word}
  .meaning{font-size:22px;margin-top:18px;display:none}
  .hint{font-size:14px;color:var(--muted);margin-top:12px;display:none;line-height:1.7}
  .tap{margin-top:28px;color:var(--muted);font-size:14px}
  .buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .bad{background:#fee2e2;color:#991b1b}
  .mid{background:#fef3c7;color:#92400e}
  .good{background:#dcfce7;color:#166534}
  .progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:12px}
  .bar{height:100%;width:0;background:var(--accent)}
  .small{font-size:12px;color:var(--muted)}
  details{margin-top:14px}
  summary{cursor:pointer;font-weight:700}
  textarea{width:100%;min-height:120px;margin-top:10px}
  .empty{color:var(--muted);line-height:1.8}
  @media(max-width:600px){
    .top{grid-template-columns:repeat(2,1fr)}
    .word{font-size:34px}
    .buttons{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>TOEIC 短期詰め込み単語</h1>

  <div class="top">
    <div class="stat"><b id="dueCount">0</b><span>今すぐ復習</span></div>
    <div class="stat"><b id="todayCount">0</b><span>今日回答</span></div>
    <div class="stat"><b id="masteredCount">0</b><span>ほぼ定着</span></div>
    <div class="stat"><b id="daysLeft">0</b><span>試験まで</span></div>
  </div>

  <div class="panel">
    <div class="row">
      <label>試験日 <input type="date" id="examDate" value="2026-07-21"></label>
      <label>1日の目標 <input type="number" id="dailyGoal" min="10" max="500" value="100" style="width:90px"></label>
      <button class="primary" id="startBtn">学習スタート</button>
      <button class="ghost" id="resetTodayBtn">今日の回数をリセット</button>
    </div>
    <div class="progress"><div class="bar" id="goalBar"></div></div>
    <div class="small" id="goalText" style="margin-top:6px"></div>
  </div>

  <div class="card" id="card">
    <div class="word" id="word">スタートを押してね</div>
    <div class="meaning" id="meaning"></div>
    <div class="hint" id="hint"></div>
    <div class="tap" id="tapText">カードを押すと答えを表示</div>
  </div>

  <div class="buttons">
    <button class="bad" id="badBtn" disabled>知らない<br><span class="small">10分後に再登場</span></button>
    <button class="mid" id="midBtn" disabled>微妙<br><span class="small">1時間後に再登場</span></button>
    <button class="good" id="goodBtn" disabled>知ってる<br><span class="small">間隔を伸ばす</span></button>
  </div>

  <details class="panel">
    <summary>単語を追加・編集する</summary>
    <p class="small">1行に「英単語,意味,覚え方メモ」。メモは省略可。</p>
    <textarea id="importBox" placeholder="abandon,放棄する,abandon shipで覚える&#10;purchase,購入する,名詞と動詞の両方"></textarea>
    <div class="row" style="margin-top:10px">
      <button class="primary" id="addBtn">追加する</button>
      <button class="ghost" id="exportBtn">一覧を表示</button>
      <button class="danger" id="resetAllBtn">学習データを全削除</button>
    </div>
  </details>
</div>

<script>
const starterWords = [
["abandon","放棄する","abandon a plan"],
["acquire","獲得する","会社や技能を手に入れる"],
["additional","追加の","addの仲間"],
["adequate","十分な","必要量を満たす"],
["approximately","およそ","aboutと同じ感覚"],
["arrange","手配する、整える","予定や物を整える"],
["available","利用できる、空いている","人・物・時間に使う"],
["benefit","利益、恩恵","beneficialもセット"],
["confirm","確認する","予約確認で頻出"],
["conduct","実施する","conduct a survey"],
["consider","検討する","consider doing"],
["contract","契約","sign a contract"],
["convenient","便利な","場所や時間にも使う"],
["delay","遅らせる、遅延","flight delay"],
["deliver","配達する、届ける","deliveryの動詞"],
["department","部門、部署","sales department"],
["despite","〜にもかかわらず","後ろは名詞"],
["determine","決定する","determine whether"],
["effective","効果的な","effectは名詞"],
["employee","従業員","employerは雇用主"],
["ensure","確実にする","make sureに近い"],
["equipment","設備、機器","不可算名詞"],
["estimate","見積もる、見積もり","price estimate"],
["facility","施設、設備","複数形facilitiesも頻出"],
["frequently","頻繁に","oftenより硬め"],
["increase","増加する、増加","名詞と動詞"],
["indicate","示す","グラフ説明で頻出"],
["maintain","維持する","maintenanceもセット"],
["negotiate","交渉する","negotiate with"],
["notify","知らせる","notify A of B"],
["participate","参加する","participate in"],
["policy","方針、規定","company policy"],
["postpone","延期する","put offと同じ"],
["purchase","購入する、購入","buyより硬い"],
["require","必要とする","require A to do"],
["schedule","予定、予定を組む","発音はスケジュール"],
["submit","提出する","submit a report"],
["temporary","一時的な","temporary staff"],
["vacant","空いている","部屋・役職に使う"],
["verify","確認する、検証する","情報が正しいか確かめる"]
];

const LS_KEY = "toeic_cram_words_v1";
const SETTINGS_KEY = "toeic_cram_settings_v1";

let words = [];
let current = null;
let revealed = false;

function now(){ return Date.now(); }
function todayKey(){ return new Date().toISOString().slice(0,10); }

function load(){
  const raw = localStorage.getItem(LS_KEY);
  if(raw){
    words = JSON.parse(raw);
  } else {
    words = starterWords.map((w,i)=>({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+i),
      word:w[0], meaning:w[1], hint:w[2]||"",
      level:0, correct:0, wrong:0, next:0, seen:0, last:0
    }));
    save();
  }
  const settings = JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}");
  examDate.value = settings.examDate || "2026-07-21";
  dailyGoal.value = settings.dailyGoal || 100;
  refreshStats();
}

function save(){
  localStorage.setItem(LS_KEY, JSON.stringify(words));
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({
    examDate: examDate.value,
    dailyGoal: Number(dailyGoal.value)||100
  }));
}

function dueWords(){
  const t = now();
  return words.filter(w => (w.next||0) <= t);
}

function chooseNext(){
  const due = dueWords();
  if(!due.length){
    current = null;
    word.textContent = "今すぐ復習する単語はなし";
    meaning.textContent = "";
    hint.textContent = "少し時間を置くか、新しい単語を追加してね。";
    meaning.style.display = "none";
    hint.style.display = "block";
    tapText.textContent = "";
    setButtons(false);
    refreshStats();
    return;
  }
  due.sort((a,b)=>{
    if((a.level||0)!==(b.level||0)) return (a.level||0)-(b.level||0);
    if((a.seen||0)!==(b.seen||0)) return (a.seen||0)-(b.seen||0);
    return Math.random()-.5;
  });
  current = due[0];
  revealed = false;
  word.textContent = current.word;
  meaning.textContent = current.meaning;
  hint.textContent = current.hint || "";
  meaning.style.display = "none";
  hint.style.display = "none";
  tapText.textContent = "カードを押すと答えを表示";
  setButtons(false);
  refreshStats();
}

function reveal(){
  if(!current || revealed) return;
  revealed = true;
  meaning.style.display = "block";
  if(current.hint) hint.style.display = "block";
  tapText.textContent = "自己評価してね";
  setButtons(true);
}

function setButtons(on){
  badBtn.disabled = !on; midBtn.disabled = !on; goodBtn.disabled = !on;
}

function answer(type){
  if(!current) return;
  const t = now();
  current.seen = (current.seen||0)+1;
  current.last = t;
  const td = todayKey();
  current.today = current.today===td ? td : td;
  current.todayCount = (current.todayCount||0)+1;

  if(type==="bad"){
    current.wrong=(current.wrong||0)+1;
    current.level=Math.max(0,(current.level||0)-1);
    current.next=t+10*60*1000;
  } else if(type==="mid"){
    current.next=t+60*60*1000;
  } else {
    current.correct=(current.correct||0)+1;
    current.level=Math.min(6,(current.level||0)+1);
    const intervals=[2,6,12,24,48,96,168]; // hours
    current.next=t+intervals[current.level]*60*60*1000;
  }
  save();
  chooseNext();
}

function refreshStats(){
  const td=todayKey();
  const today=words.reduce((s,w)=>s+(w.today===td?(w.todayCount||0):0),0);
  const due=dueWords().length;
  const mastered=words.filter(w=>(w.level||0)>=4).length;
  dueCount.textContent=due;
  todayCount.textContent=today;
  masteredCount.textContent=mastered;
  const exam = new Date(examDate.value+"T23:59:59");
  const days = Math.max(0, Math.ceil((exam-new Date())/86400000));
  daysLeft.textContent=days;
  const goal=Number(dailyGoal.value)||100;
  goalBar.style.width=Math.min(100,today/goal*100)+"%";
  goalText.textContent=`今日 ${today} / ${goal} 回回答`;
}

card.addEventListener("click", reveal);
startBtn.addEventListener("click", chooseNext);
badBtn.addEventListener("click",()=>answer("bad"));
midBtn.addEventListener("click",()=>answer("mid"));
goodBtn.addEventListener("click",()=>answer("good"));

examDate.addEventListener("change",()=>{save();refreshStats();});
dailyGoal.addEventListener("change",()=>{save();refreshStats();});

resetTodayBtn.addEventListener("click",()=>{
  const td=todayKey();
  words.forEach(w=>{ if(w.today===td) w.todayCount=0; });
  save(); refreshStats();
});

addBtn.addEventListener("click",()=>{
  const lines=importBox.value.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  let added=0;
  for(const line of lines){
    const [w,m,...h]=line.split(",").map(x=>x.trim());
    if(!w||!m) continue;
    if(words.some(x=>x.word.toLowerCase()===w.toLowerCase())) continue;
    words.push({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()),
      word:w, meaning:m, hint:h.join(","),
      level:0, correct:0, wrong:0, next:0, seen:0, last:0
    });
    added++;
  }
  save(); refreshStats();
  alert(`${added}語追加したよ`);
  importBox.value="";
});

exportBtn.addEventListener("click",()=>{
  importBox.value=words.map(w=>[w.word,w.meaning,w.hint||""].join(",")).join("\n");
});

resetAllBtn.addEventListener("click",()=>{
  if(!confirm("単語と学習履歴を全部消す？")) return;
  localStorage.removeItem(LS_KEY);
  words=[];
  starterWords.forEach((w,i)=>words.push({
    id:String(Date.now()+i),word:w[0],meaning:w[1],hint:w[2]||"",
    level:0,correct:0,wrong:0,next:0,seen:0,last:0
  }));
  save(); chooseNext(); refreshStats();
});

load();
</script>
</body>
</html>
