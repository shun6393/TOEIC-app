<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>TOEIC 短期詰め込み単語</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">
  <h1>TOEIC 短期詰め込み単語</h1>

  <div class="top">
    <div class="stat"><b id="dueCount">0</b><span>今すぐ復習</span></div>
    <div class="stat"><b id="todayCount">0</b><span>今日回答</span></div>
    <div class="stat"><b id="masteredCount">0</b><span>ほぼ定着</span></div>
    <div class="stat"><b id="daysLeft">0</b><span>試験まで</span></div>
  </div>

  <div class="panel">
    <div class="row">
      <label>試験日 <input type="date" id="examDate" value="2026-07-21"></label>
      <label>目標点数
        <select id="targetScore">
          <option value="400">400点</option>
          <option value="500">500点</option>
          <option value="600" selected>600点</option>
          <option value="700">700点</option>
          <option value="800">800点</option>
          <option value="900">900点</option>
        </select>
      </label>
      <label>1日の目標 <input type="number" id="dailyGoal" min="10" max="500" value="100" style="width:90px"></label>
      <button class="primary" id="startBtn">学習スタート</button>
      <button class="ghost" id="resetTodayBtn">今日の回数をリセット</button>
    </div>
    <div class="progress"><div class="bar" id="goalBar"></div></div>
    <div class="small" id="goalText" style="margin-top:6px"></div>

    <section class="study-plan" aria-labelledby="studyPlanTitle">
      <h2 id="studyPlanTitle">目標達成までの学習計画</h2>
      <div class="plan-grid">
        <div class="plan-item"><span>必要語彙数の目安</span><b id="vocabTarget">0語</b></div>
        <div class="plan-item"><span>残り新規単語数</span><b id="remainingNew">0語</b></div>
        <div class="plan-item"><span>1日に覚える新規単語</span><b id="dailyNew">0語</b></div>
        <div class="plan-item"><span>1日の復習回数目安</span><b id="dailyReview">0回</b></div>
      </div>
      <p class="small plan-note" id="planNotice"></p>
    </section>
  </div>

  <div class="card" id="card">
    <div class="word" id="word">スタートを押してね</div>
    <div class="meaning" id="meaning"></div>
    <div class="hint" id="hint"></div>
    <div class="tap" id="tapText">カードを押すと答えを表示</div>
  </div>

  <div class="buttons">
    <button class="bad" id="badBtn" disabled>知らない<br><span class="small">10分後に再登場</span></button>
    <button class="mid" id="midBtn" disabled>微妙<br><span class="small">1時間後に再登場</span></button>
    <button class="good" id="goodBtn" disabled>知ってる<br><span class="small">間隔を伸ばす</span></button>
  </div>

  <details class="panel">
    <summary>単語管理（登録 <span id="registeredCount">0</span>語）</summary>
    <div class="word-list-tools">
      <label for="wordSearch">単語を検索</label>
      <input type="search" id="wordSearch" placeholder="英単語または日本語の意味" autocomplete="off">
      <span class="small" id="searchResultCount"></span>
    </div>
    <div class="word-list-wrap">
      <table class="word-list">
        <thead>
          <tr><th>英単語</th><th>意味</th><th>ヒント</th><th>学習状況</th></tr>
        </thead>
        <tbody id="wordListBody"></tbody>
      </table>
      <p class="empty word-list-empty" id="wordListEmpty">該当する単語がありません。</p>
    </div>
    <div class="pagination" aria-label="単語一覧のページ操作">
      <button class="ghost" id="prevPageBtn" type="button">前へ</button>
      <span id="pageInfo" class="small">1 / 1ページ</span>
      <button class="ghost" id="nextPageBtn" type="button">次へ</button>
    </div>
    <div class="word-import">
    <p class="small">1行に「英単語,意味,覚え方メモ」。メモは省略可。</p>
    <textarea id="importBox" placeholder="abandon,放棄する,abandon shipで覚える&#10;purchase,購入する,名詞と動詞の両方"></textarea>
    <div class="row" style="margin-top:10px">
      <button class="primary" id="addBtn">追加する</button>
      <button class="ghost" id="exportBtn">一覧を表示</button>
      <button class="danger" id="resetAllBtn">学習データを全削除</button>
    </div>
    </div>
  </details>
</div>

<script src="words.js"></script>
<script src="script.js"></script>
</body>
</html>
